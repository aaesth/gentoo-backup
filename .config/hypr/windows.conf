windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

$POPUP_CLASS = feh|mpv|pureref|webcamoid|solaar|psensor|qalculate|iwgtk|easyeffects|desktop-portal|rofi|overskride|waypaper|missioncenter
$POPUP_TITLE = Picture-in-Picture
windowrule {
	name = popup
	match:tag = popup

	float = true
	focus_on_activate = true
}
windowrule = match:class (?i).*($POPUP_CLASS).*, tag +popup
windowrule = match:title (?i).*($POPUP_TITLE).*, tag +popup

$FORCED_CLASS = rofi|hyprpolkitagent
windowrule {
	name = forced
	match:tag = forced

	stay_focused = true
	dim_around = true
}
windowrule = match:class (?i).*($FORCED_CLASS).*, tag +forced
