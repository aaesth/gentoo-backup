
source = ~/.config/assets/palette/palette.conf

monitor = DP-1, 2560x1440@164.96, 1080x0, 1
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1, transform, 3

source = programs.conf
source = style.conf
source = input.conf
source = keys.conf
source = windows.conf
source = plugins.conf
source = wallpaper.conf
windowrule = no_blur 1, match:title ^(deadlocked_overlay)$

device {
    name = opentabletdriver-virtual-artist-tablet
    output = DP-1
}
